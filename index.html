<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    

    <div class="container">

        <a href="http://localhost:3000/thread.html?id=1">threadへ</a>

        <header>
        <h1>掲示板</h1>
        </header>

        <form id="form">
            <label for="usernameadd">名前</label>
            <input type="text" id="usernameadd" placeholder="名前" maxlength="25" required>
        
            <label for="content">内容</label>
            <textarea id="content" rows="5" placeholder="内容" required></textarea>

            <br>

            <button id="postButton" type="submit">投稿</button>    
        </form>

        <div id="posts">
           
        </div>

        <form id="threadform"> 
            <label for="threadtitle">スレッド名</label>
            <input type="text" id="threadtitle" placeholder="スレッド名" maxlength="25" required>

            <label for="threadusername">ユーザー名</label>
            <input type="text" id="threadusername" placeholder="ユーザー名" maxlength="25" required>

            <br>

            <button id="threadButton" type="submit">作成</button>    
        </form>

        <div id="threads">
            
        </div>

        

    </div>
    
    
    <script src="script.js"></script>
</body>
</html>
